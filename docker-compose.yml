services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      QUANT_DATABASE_URL: sqlite:////data/quant_platform.db
      QUANT_DEFAULT_OWNER_ID: default
      QUANT_DEFAULT_OWNER_PIN: "0000"
      QUANT_AUTH_SECRET: local-dev-secret
      QUANT_MARKET_DATA_PROVIDER: finance_data_reader
    volumes:
      - quant-data:/data

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  quant-data:
