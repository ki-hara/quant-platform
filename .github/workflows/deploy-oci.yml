name: Deploy to Oracle VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-oci
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/ki-hara/quant-platform

    steps:
      - name: Checkout repository
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach "${GITHUB_SHA}"

      - name: Build and push container image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker build \
            --tag "${IMAGE_NAME}:${GITHUB_SHA}" \
            --tag "${IMAGE_NAME}:main" \
            .
          docker push "${IMAGE_NAME}:${GITHUB_SHA}"
          docker push "${IMAGE_NAME}:main"

      - name: Deploy on Oracle VM
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          command_timeout: 20m
          script_stop: true
          script: |
            set -e
            cd ~/quant-platform
            pkill -f "docker compose up -d --buil[d]" || true
            git fetch origin main
            git reset --hard origin/main
            cd deploy/oci
            ENV_FILE=/opt/quant-platform/.env
            if [ ! -f "$ENV_FILE" ]; then
              echo "Missing $ENV_FILE. Create it from deploy/oci/production.env.example before deploying."
              exit 1
            fi
            if [ ! -r "$ENV_FILE" ]; then
              sudo chown "$(id -u):$(id -g)" "$ENV_FILE"
              sudo chmod 600 "$ENV_FILE"
            fi
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            timeout 10m docker compose pull
            timeout 5m docker compose up -d --no-build --remove-orphans
            timeout 2m docker image prune -f
