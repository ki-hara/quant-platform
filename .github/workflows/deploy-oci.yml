name: Deploy to Oracle VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-oci
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Verify backend
        working-directory: backend
        run: |
          python -m pip install uv==0.11.2
          uv sync --locked --extra dev
          uv run ruff check .
          uv run pytest -q

      - name: Verify frontend
        working-directory: frontend
        run: |
          npm ci
          npm test -- --run
          npm run build

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/ki-hara/quant-platform

    steps:
      - name: Checkout repository
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach "${GITHUB_SHA}"

      - name: Build and push container image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker build \
            --tag "${IMAGE_NAME}:${GITHUB_SHA}" \
            --tag "${IMAGE_NAME}:main" \
            .
          docker push "${IMAGE_NAME}:${GITHUB_SHA}"
          docker push "${IMAGE_NAME}:main"

      - name: Deploy on Oracle VM
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          command_timeout: 20m
          script_stop: true
          script: |
            set -e
            cd ~/quant-platform
            git fetch origin main
            git reset --hard origin/main
            cd deploy/oci
            ENV_FILE=/opt/quant-platform/.env
            if [ ! -f "$ENV_FILE" ]; then
              echo "Missing $ENV_FILE. Create it from deploy/oci/production.env.example before deploying."
              exit 1
            fi
            if [ ! -r "$ENV_FILE" ]; then
              sudo -n chown "$(id -u):$(id -g)" "$ENV_FILE"
              sudo -n chmod 600 "$ENV_FILE"
            fi
            echo "${{ secrets.GITHUB_TOKEN }}" | timeout 2m docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            timeout 5m docker compose pull
            timeout 5m docker compose up -d --no-build --remove-orphans
            timeout 1m docker image prune -f
